<!DOCTYPE html>
<html lang="vi">
<head>

<meta charset="UTF-8">
<title>Làm bài thi - Smart Exam</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

/* ===== BODY ===== */

body{
margin:0;
font-family:"Segoe UI",sans-serif;
background:#f1f5f9;
}

/* ===== NAVBAR (ĐỒNG BỘ EXAM BANK) ===== */

.navbar{
background:#ffffff;
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 60px;
border-bottom:1px solid #e2e8f0;
box-shadow:0 4px 10px rgba(0,0,0,0.04);
position:sticky;
top:0;
z-index:1000;
}

.logo{
font-size:20px;
font-weight:700;
color:#0B3C5D;
display:flex;
align-items:center;
gap:8px;
cursor:pointer;
}

.nav-right{
display:flex;
align-items:center;
gap:20px;
}

/* TIMER */

.timer{
font-size:14px;
color:#475569;
display:flex;
align-items:center;
gap:6px;
}

/* SUBMIT BUTTON */

.submit-btn{
background:linear-gradient(135deg,#0B3C5D,#2563eb);
color:white;
padding:10px 26px;
border-radius:50px;
border:none;
cursor:pointer;
font-weight:600;
transition:0.25s;
}

.submit-btn:hover{
transform:translateY(-2px);
box-shadow:0 10px 25px rgba(37,99,235,0.35);
}

/* ===== GRID ===== */

.parent{
display:grid;
grid-template-columns:4fr 1fr;
gap:30px;
max-width:1200px;
margin:auto;
padding:40px 20px;
}

/* ===== QUESTION CARD ===== */

.question{
background:white;
padding:25px;
border-radius:24px;
border:1px solid #e2e8f0;
margin-bottom:20px;
transition:0.25s;
}

.question:hover{
box-shadow:0 15px 35px rgba(0,0,0,0.05);
}

/* ANSWERS */

.answers label{
display:block;
padding:12px;
margin-top:8px;
border-radius:10px;
cursor:pointer;
border:2px solid transparent;
transition:0.2s;
}

.answers label:hover{
border:2px solid #2563eb;
background:#f8fafc;
}

/* ===== SIDEBAR ===== */

.question-box{
position:sticky;
top:90px;
background:white;
border:1px solid #e2e8f0;
border-radius:24px;
padding:25px;
min-height:420px;
box-shadow:0 10px 30px rgba(0,0,0,0.04);
}

.question-box b{
font-size:16px;
color:#1e293b;
}

/* NAV GRID */

.question-nav{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:10px;
margin-top:15px;
}

/* NAV BUTTON */

.nav-btn{
background:#e2e8f0;
padding:10px;
text-align:center;
border-radius:10px;
cursor:pointer;
font-weight:600;
transition:0.2s;
}

.nav-btn:hover{
background:#cbd5f5;
}

.nav-btn.done{
background:#10b981;
color:white;
}

/* ===== OVERLAY ===== */

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.45);
display:none;
z-index:999;
}

/* ===== RESULT POPUP ===== */

.result-popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:40px;
border-radius:24px;
width:420px;
display:none;
box-shadow:0 20px 50px rgba(0,0,0,0.25);
text-align:center;
z-index:1000;
}

/* ICON */

.result-icon{
font-size:60px;
color:#22c55e;
margin-bottom:10px;
}

/* TITLE */

.result-title{
font-size:24px;
font-weight:700;
margin-bottom:8px;
}

/* SCORE */

.result-score{
font-size:18px;
font-weight:600;
margin-bottom:6px;
color:#1e293b;
}

/* TIME */

.result-time{
font-size:14px;
color:#64748b;
margin-bottom:18px;
}

/* PROGRESS */

.progress{
height:10px;
background:#e2e8f0;
border-radius:10px;
overflow:hidden;
margin-bottom:20px;
}

.progress-bar{
height:10px;
background:#22c55e;
width:0%;
}

/* RESULT LIST */

.result-list{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:12px;
font-size:14px;
margin-top:10px;
}

.result-item{
padding:6px 10px;
background:#f8fafc;
border-radius:6px;
}

/* COLORS */

.correct{
color:#16a34a;
font-weight:700;
}

.wrong{
color:#dc2626;
font-weight:700;
}

/* CONFIRM BUTTON */

.confirm-btn{
margin-top:25px;
width:100%;
padding:12px;
background:linear-gradient(135deg,#0B3C5D,#2563eb);
color:white;
border:none;
border-radius:50px;
cursor:pointer;
font-weight:600;
font-size:15px;
}

.confirm-btn:hover{
box-shadow:0 10px 25px rgba(37,99,235,0.35);
}

</style>

</head>

<body>

<div class="overlay" id="overlay"></div>

<!-- NAVBAR -->

<div class="navbar">

<div class="logo" onclick="goHome()">
<i class="fas fa-layer-group"></i> Smart Exam
</div>

<div class="nav-right">

<div class="timer">
<i class="fa-regular fa-clock"></i>
<span id="timer">00:00</span>
</div>

<button class="submit-btn" onclick="submitExam()">
Nộp bài
</button>

</div>

</div>

<!-- MAIN GRID -->

<div class="parent">

<div id="questionList"></div>

<div class="question-box">

<b>Câu hỏi</b>

<div class="question-nav" id="nav"></div>

</div>

</div>

<!-- RESULT POPUP -->

<div class="result-popup" id="resultBox">

<div class="result-icon">
<i class="fa-solid fa-circle-check"></i>
</div>

<div class="result-title">
Kết quả bài thi
</div>

<div class="result-score" id="score"></div>

<div class="result-time" id="timeUsed"></div>

<div class="progress">
<div class="progress-bar" id="progressBar"></div>
</div>

<div class="result-list" id="resultList"></div>

<button class="confirm-btn" onclick="goHistory()">
Xác nhận
</button>

</div>

<script>

/* ===== ORIGINAL LOGIC GIỮ NGUYÊN ===== */

let exam = JSON.parse(localStorage.getItem("examData"))

if(!exam){
alert("Không có dữ liệu đề thi")
}

let questions = exam.questions
let time = exam.time * 60
let totalTime = time
let timeUsed = 0

let answers = new Array(questions.length)

const questionList=document.getElementById("questionList")
const nav=document.getElementById("nav")

questions.forEach((q,i)=>{

questionList.innerHTML+=`

<div class="question" id="q${i}">

<b>Câu ${i+1}: ${q.q}</b>

<div class="answers">

<label onclick="selectAnswer(${i},'A',this)">
<input type="radio" name="q${i}">
A. ${q.A}
</label>

<label onclick="selectAnswer(${i},'B',this)">
<input type="radio" name="q${i}">
B. ${q.B}
</label>

<label onclick="selectAnswer(${i},'C',this)">
<input type="radio" name="q${i}">
C. ${q.C}
</label>

<label onclick="selectAnswer(${i},'D',this)">
<input type="radio" name="q${i}">
D. ${q.D}
</label>

</div>

</div>
`

nav.innerHTML+=`<div class="nav-btn" onclick="gotoQuestion(${i})">${i+1}</div>`

})

function selectAnswer(i,val,label){

answers[i]=val

let labels=label.parentElement.querySelectorAll("label")

labels.forEach(l=>{
l.style.border="2px solid transparent"
})

label.style.border="2px solid #2563eb"

nav.children[i].classList.add("done")

}

function gotoQuestion(i){

document.getElementById("q"+i).scrollIntoView({
behavior:"smooth"
})

}

let timer=setInterval(()=>{

let m=Math.floor(time/60)
let s=time%60

document.getElementById("timer").innerText=
String(m).padStart(2,"0")+":"+
String(s).padStart(2,"0")

time--
timeUsed++

if(time<0){

clearInterval(timer)
submitExam()

}

},1000)

function submitExam(){

clearInterval(timer)

let correct=0
let resultHTML=""

questions.forEach((q,i)=>{

if(answers[i]===q.correct){

correct++

resultHTML+=`<span class="result-item">Câu ${i+1}: <span class="correct">✔</span></span>`

}else{

resultHTML+=`<span class="result-item">Câu ${i+1}: <span class="wrong">✖</span></span>`

}

})

document.getElementById("score").innerText=
"Điểm: "+correct+" / "+questions.length

let minutes=Math.floor(timeUsed/60)
let seconds=timeUsed%60

document.getElementById("timeUsed").innerText=
"Thời gian làm bài: "+
String(minutes).padStart(2,"0")+":"+
String(seconds).padStart(2,"0")

document.getElementById("resultList").innerHTML=resultHTML

let percent=(correct/questions.length)*100
document.getElementById("progressBar").style.width=percent+"%"

document.getElementById("overlay").style.display="block"
document.getElementById("resultBox").style.display="block"

}

function goHistory(){
window.location.href="history.html"
}

function goHome(){
window.location.href="../index.html"
}

</script>

</body>
</html>
