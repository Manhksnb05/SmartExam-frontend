<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Ngân hàng đề thi - Smart Exam</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

/* ===== BODY BACKGROUND ===== */

body{
margin:0;
font-family:"Segoe UI",sans-serif;
background:#f1f5f9;   /* nền xám nhạt để tách navbar */
}

/* ===== NAVBAR ===== */

.navbar{

background:#ffffff;

display:flex;
justify-content:space-between;
align-items:center;

padding:18px 60px;

border-bottom:1px solid #e2e8f0;

box-shadow:0 4px 10px rgba(0,0,0,0.04);

position:sticky;
top:0;
z-index:1000;

}

/* LOGO */

.logo{
font-size:20px;
font-weight:700;
color:#0B3C5D;
display:flex;
align-items:center;
gap:8px;
}

/* MENU */

.nav-links{
display:flex;
align-items:center;
gap:28px;
}

.nav-links a{
text-decoration:none;
color:#334155;
font-weight:500;
transition:0.25s;
}

.nav-links a:hover{
color:#0B3C5D;
}

/* ACTIVE MENU */

.nav-links a.active{
color:#0B3C5D;
font-weight:700;
border-bottom:2px solid #0B3C5D;
padding-bottom:4px;
}

/* LOGIN BUTTON */

.nav-cta{
background:#0B3C5D;
color:white !important;
padding:10px 18px;
border-radius:30px;
font-weight:600;
transition:0.25s;
}

.nav-cta:hover{
background:#2563eb;
}

/* ===== MAIN SECTION ===== */

.features{
max-width:1200px;
margin:auto;
padding:60px 20px;
}

/* PAGE HEADER */

.page-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:40px;
}

.page-header h2{
font-size:32px;
color:#0B3C5D;
font-weight:700;
}

/* UPLOAD BUTTON */

.upload-box{
display:flex;
align-items:center;
gap:10px;
background:linear-gradient(135deg,#0B3C5D,#2563eb);
color:white;
padding:12px 20px;
border-radius:50px;
cursor:pointer;
font-weight:600;
transition:0.3s;
box-shadow:0 5px 15px rgba(37,99,235,0.25);
}

.upload-box:hover{
transform:translateY(-2px);
box-shadow:0 10px 25px rgba(37,99,235,0.35);
}

.upload-box input{
display:none;
}

/* SEARCH BOX */

.search-box{
margin-bottom:40px;
max-width:450px;
position:relative;
}

.search-box input{
width:100%;
padding:14px 15px 14px 45px;
border-radius:50px;
border:1px solid #e2e8f0;
outline:none;
font-size:15px;
transition:0.25s;
}

.search-box input:focus{
border-color:#3b82f6;
box-shadow:0 5px 15px rgba(59,130,246,0.15);
}

.search-box i{
position:absolute;
left:16px;
top:15px;
color:#64748b;
}

/* GRID */

.feature-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:25px;
}

/* EXAM CARD */

.exam-card{
padding:30px;
border-radius:24px;
background:white;
border:1px solid #e2e8f0;
transition:0.3s;
display:flex;
flex-direction:column;
gap:10px;
}

.exam-card:hover{
transform:translateY(-6px);
box-shadow:0 20px 40px rgba(0,0,0,0.05);
}

/* CARD HEADER */

.exam-header{
display:flex;
align-items:center;
gap:12px;
margin-bottom:5px;
}

.exam-header i{
font-size:22px;
color:#0B3C5D;
background:#e0f2fe;
width:40px;
height:40px;
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
}

.exam-title{
font-size:18px;
font-weight:700;
color:#1e293b;
}

/* DATE */

.exam-date{
font-size:14px;
color:#64748b;
display:flex;
align-items:center;
gap:6px;
}

/* ACTION BUTTONS */

.exam-actions{
display:flex;
gap:12px;
margin-top:12px;
align-items:center;
flex-wrap:wrap;
}

/* PRACTICE BUTTON */

.btn-practice{
background:linear-gradient(135deg,#0B3C5D,#2563eb);
color:white;
padding:9px 16px;
border-radius:50px;
font-size:13px;
font-weight:600;
text-decoration:none;
transition:0.25s;
}

.btn-practice:hover{
transform:translateY(-2px);
box-shadow:0 8px 20px rgba(37,99,235,0.35);
}

/* CREATE BUTTON */

.btn-create{
background:#10b981;
color:white;
padding:9px 16px;
border-radius:50px;
font-size:13px;
font-weight:600;
text-decoration:none;
transition:0.25s;
}

.btn-create:hover{
background:#059669;
}

/* ICON BUTTON */

.icon-btn{
width:38px;
height:38px;
border:none;
border-radius:12px;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
font-size:14px;
background:#f1f5f9;
color:#334155;
transition:0.25s;
}

.icon-btn:hover{
background:#e2e8f0;
transform:scale(1.07);
}

</style>

</head>

<body>

<!-- NAVBAR -->

<nav class="navbar">

<div class="logo">
<i class="fas fa-layer-group"></i> Smart Exam
</div>

<div class="nav-links">
<a href="../index.html">Trang chủ</a>
<a href="exam-bank.html" class="active">Ngân hàng đề</a>
<a href="history.html">Lịch sử thi</a>
<a href="community-exams.html">Khám phá đề</a>
<a href="../login.html" class="nav-cta">Đăng nhập</a>
</div>

</nav>


<!-- MAIN CONTENT -->

<section class="features">

<div class="page-header">

<h2>Ngân hàng đề thi</h2>

<label class="upload-box">
<i class="fas fa-upload"></i>
Upload bộ đề
<input type="file">
</label>

</div>

<!-- SEARCH -->

<div class="search-box">
<i class="fas fa-search"></i>
<input type="text" id="searchInput" placeholder="Tìm kiếm đề thi...">
</div>

<!-- EXAM LIST -->

<div class="feature-grid" id="examList">

<!-- CARD 1 -->

<div class="exam-card">

<div class="exam-header">
<i class="fas fa-file-alt"></i>
<div class="exam-title">Đề thi Toán 12</div>
</div>

<div class="exam-date">
<i class="fas fa-calendar"></i> 10/03/2026
</div>

<div class="exam-actions">

<a href="practice.html" class="btn-practice">Luyện đề</a>

<a href="create-exam.html" class="btn-create">Tạo đề</a>

<button class="icon-btn">
<i class="fas fa-download"></i>
</button>

<button class="icon-btn">
<i class="fas fa-trash"></i>
</button>

</div>

</div>


<!-- CARD 2 -->

<div class="exam-card">

<div class="exam-header">
<i class="fas fa-file-alt"></i>
<div class="exam-title">Đề thi Tiếng Anh</div>
</div>

<div class="exam-date">
<i class="fas fa-calendar"></i> 15/03/2026
</div>

<div class="exam-actions">

<a href="practice.html" class="btn-practice">Luyện đề</a>

<a href="create-exam.html" class="btn-create">Tạo đề</a>

<button class="icon-btn">
<i class="fas fa-download"></i>
</button>

<button class="icon-btn">
<i class="fas fa-trash"></i>
</button>

</div>

</div>


<!-- CARD 3 -->

<div class="exam-card">

<div class="exam-header">
<i class="fas fa-file-alt"></i>
<div class="exam-title">Đề kiểm tra Vật lý</div>
</div>

<div class="exam-date">
<i class="fas fa-calendar"></i> 20/03/2026
</div>

<div class="exam-actions">

<a href="practice.html" class="btn-practice">Luyện đề</a>

<a href="create-exam.html" class="btn-create">Tạo đề</a>

<button class="icon-btn">
<i class="fas fa-download"></i>
</button>

<button class="icon-btn">
<i class="fas fa-trash"></i>
</button>

</div>

</div>

</div>

</section>


<script>

const searchInput = document.getElementById("searchInput")

searchInput.addEventListener("input", function(){

let keyword = this.value.toLowerCase()

document.querySelectorAll(".exam-card").forEach(card => {

let title = card.querySelector(".exam-title").innerText.toLowerCase()

card.style.display =
title.includes(keyword) ? "flex" : "none"

})

})

</script>

</body>
</html>
