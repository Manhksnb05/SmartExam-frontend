<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Ngân hàng đề thi - Smart Exam</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

/* GLOBAL */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Segoe UI",sans-serif;
}

body{
background:linear-gradient(180deg,#f8faff,#eef2ff);
min-height:100vh;
animation:fadePage 1s ease;
}

@keyframes fadePage{
from{opacity:0;transform:translateY(10px)}
to{opacity:1;transform:translateY(0)}
}

/* NAVBAR */

.navbar{
background:rgba(255,255,255,0.85);
backdrop-filter:blur(10px);
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 60px;
border-bottom:1px solid #e2e8f0;
box-shadow:0 6px 20px rgba(0,0,0,0.05);
position:sticky;
top:0;
z-index:1000;
}

.logo{
font-size:22px;
font-weight:700;
color:#0B3C5D;
display:flex;
align-items:center;
gap:8px;
animation:floatLogo 4s infinite ease-in-out;
}

@keyframes floatLogo{
0%{transform:translateY(0)}
50%{transform:translateY(-3px)}
100%{transform:translateY(0)}
}

/* MENU */

.nav-links{
display:flex;
align-items:center;
gap:28px;
}

.nav-links a{
text-decoration:none;
color:#334155;
font-weight:500;
position:relative;
transition:0.3s;
}

.nav-links a::after{
content:"";
position:absolute;
left:0;
bottom:-6px;
width:0%;
height:2px;
background:#2563eb;
transition:0.3s;
}

.nav-links a:hover::after{
width:100%;
}

.nav-links a:hover{
color:#0B3C5D;
}

.nav-links a.active{
color:#0B3C5D;
font-weight:700;
}

.nav-cta{
background:linear-gradient(135deg,#0B3C5D,#2563eb);
color:white !important;
padding:10px 20px;
border-radius:30px;
font-weight:600;
box-shadow:0 8px 20px rgba(37,99,235,0.3);
transition:0.3s;
}

.nav-cta:hover{
transform:translateY(-2px);
box-shadow:0 12px 30px rgba(37,99,235,0.45);
}

/* MAIN */

.features{
max-width:1200px;
margin:auto;
padding:70px 20px;
}

/* HEADER */

.page-header{
display:flex;
justify-content:space-between;
align-items:flex-start;
margin-bottom:40px;
flex-wrap:wrap;
gap:15px;
}

.page-header h2{
font-size:34px;
color:#0B3C5D;
font-weight:700;
position:relative;
}

.page-header h2::after{
content:"";
width:70px;
height:4px;
background:#3b82f6;
display:block;
margin-top:8px;
border-radius:3px;
}

/* UPLOAD */

.upload-wrapper{
display:flex;
flex-direction:column;
align-items:center;
gap:8px;
}

.upload-box{
display:flex;
align-items:center;
gap:10px;
background:linear-gradient(135deg,#0B3C5D,#2563eb);
color:white;
padding:12px 22px;
border-radius:50px;
cursor:pointer;
font-weight:600;
transition:0.3s;
box-shadow:0 10px 25px rgba(37,99,235,0.3);
}

.upload-box:hover{
transform:translateY(-3px);
box-shadow:0 15px 35px rgba(37,99,235,0.45);
}

.upload-box input{
display:none;
}

/* PRIVACY */

.privacy-option{
display:flex;
gap:40px;
font-size:14px;
color:#334155;
}

.privacy-option label{
display:flex;
align-items:center;
gap:6px;
cursor:pointer;
transition:0.2s;
}

.privacy-option label:hover{
color:#2563eb;
transform:scale(1.05);
}

/* SEARCH */

.search-box{
margin-bottom:40px;
max-width:450px;
position:relative;
}

.search-box input{
width:100%;
padding:14px 15px 14px 45px;
border-radius:50px;
border:1px solid #e2e8f0;
outline:none;
font-size:15px;
transition:0.3s;
background:white;
}

.search-box input:focus{
border-color:#3b82f6;
box-shadow:0 8px 20px rgba(59,130,246,0.2);
}

.search-box i{
position:absolute;
left:16px;
top:15px;
color:#64748b;
}

/* GRID */

.feature-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:25px;
}

/* CARD */

.exam-card{
padding:30px;
border-radius:20px;
background:white;
border:1px solid #e2e8f0;
transition:0.35s;
display:flex;
flex-direction:column;
gap:10px;
box-shadow:0 10px 20px rgba(0,0,0,0.03);
position:relative;
overflow:hidden;
}

.exam-card::before{
content:"";
position:absolute;
width:100%;
height:100%;
background:linear-gradient(120deg,transparent,rgba(59,130,246,0.15),transparent);
top:-100%;
left:-100%;
transition:0.6s;
}

.exam-card:hover::before{
top:100%;
left:100%;
}

.exam-card:hover{
transform:translateY(-8px);
box-shadow:0 25px 40px rgba(0,0,0,0.08);
}

/* HEADER */

.exam-header{
display:flex;
align-items:center;
gap:12px;
}

.exam-header i{
font-size:20px;
color:#0B3C5D;
background:#e0f2fe;
width:40px;
height:40px;
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
}

.exam-title{
font-size:18px;
font-weight:700;
color:#1e293b;
}

/* DATE */

.exam-date{
font-size:14px;
color:#64748b;
display:flex;
align-items:center;
gap:6px;
}

/* ACTIONS */

.exam-actions{
display:flex;
gap:10px;
margin-top:12px;
flex-wrap:wrap;
}

/* BUTTONS */

.btn-practice{
background:linear-gradient(135deg,#0B3C5D,#2563eb);
color:white;
padding:9px 16px;
border-radius:50px;
font-size:13px;
font-weight:600;
text-decoration:none;
transition:0.3s;
}

.btn-practice:hover{
transform:translateY(-2px);
box-shadow:0 8px 20px rgba(37,99,235,0.35);
}

.btn-create{
background:#10b981;
color:white;
padding:9px 16px;
border-radius:50px;
font-size:13px;
font-weight:600;
text-decoration:none;
transition:0.25s;
}

.btn-create:hover{
background:#059669;
}

/* ICON BUTTON */

.icon-btn{
width:38px;
height:38px;
border:none;
border-radius:12px;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
font-size:14px;
background:#f1f5f9;
color:#334155;
transition:0.25s;
}

.icon-btn:hover{
background:#e2e8f0;
transform:scale(1.08);
}

/* RESPONSIVE */

@media (max-width:768px){

.navbar{
padding:18px 20px;
}

.nav-links{
display:none;
}

.features{
padding:50px 20px;
}

.page-header{
flex-direction:column;
align-items:flex-start;
}

}

</style>

</head>

<body>

<nav class="navbar">

<div class="logo">
<i class="fas fa-layer-group"></i> Smart Exam
</div>

<div class="nav-links">
<a href="../index.html">Trang chủ</a>
<a href="exam-bank.html" class="active">Ngân hàng đề</a>
<a href="history.html">Lịch sử thi</a>
<a href="community-exams.html">Khám phá đề</a>
<a href="../login.html" class="nav-cta">Đăng nhập</a>
</div>

</nav>

<section class="features">

<div class="page-header">

<h2>Ngân hàng đề thi</h2>

<div class="upload-wrapper">

<label class="upload-box">
<i class="fas fa-upload"></i>
Upload bộ đề
<input type="file" id="examUpload">
</label>

<div class="privacy-option">
<label>
<input type="radio" name="privacy" value="public" checked>
Công khai
</label>

<label>
<input type="radio" name="privacy" value="private">
Riêng tư
</label>
</div>

</div>

</div>

<div class="search-box">
<i class="fas fa-search"></i>
<input type="text" id="searchInput" placeholder="Tìm kiếm đề thi...">
</div>

<div class="feature-grid" id="examList">

<div class="exam-card">
<div class="exam-header">
<i class="fas fa-file-alt"></i>
<div class="exam-title">Đề thi Toán 12</div>
</div>

<div class="exam-date">
<i class="fas fa-calendar"></i> 10/03/2026
</div>

<div class="exam-actions">
<a href="practice.html" class="btn-practice">Luyện đề</a>
<a href="create-exam.html" class="btn-create">Tạo đề</a>
<button class="icon-btn"><i class="fas fa-download"></i></button>
<button class="icon-btn"><i class="fas fa-trash"></i></button>
</div>
</div>

<div class="exam-card">
<div class="exam-header">
<i class="fas fa-file-alt"></i>
<div class="exam-title">Đề thi Tiếng Anh</div>
</div>

<div class="exam-date">
<i class="fas fa-calendar"></i> 15/03/2026
</div>

<div class="exam-actions">
<a href="practice.html" class="btn-practice">Luyện đề</a>
<a href="create-exam.html" class="btn-create">Tạo đề</a>
<button class="icon-btn"><i class="fas fa-download"></i></button>
<button class="icon-btn"><i class="fas fa-trash"></i></button>
</div>
</div>

<div class="exam-card">
<div class="exam-header">
<i class="fas fa-file-alt"></i>
<div class="exam-title">Đề kiểm tra Vật lý</div>
</div>

<div class="exam-date">
<i class="fas fa-calendar"></i> 20/03/2026
</div>

<div class="exam-actions">
<a href="practice.html" class="btn-practice">Luyện đề</a>
<a href="create-exam.html" class="btn-create">Tạo đề</a>
<button class="icon-btn"><i class="fas fa-download"></i></button>
<button class="icon-btn"><i class="fas fa-trash"></i></button>
</div>
</div>

</div>

</section>

<script>

/* SEARCH */

const searchInput = document.getElementById("searchInput")

searchInput.addEventListener("input", function(){

let keyword = this.value.toLowerCase()

document.querySelectorAll(".exam-card").forEach(card => {

let title = card.querySelector(".exam-title").innerText.toLowerCase()

card.style.display =
title.includes(keyword) ? "flex" : "none"

})

})

/* UPLOAD FRONTEND ONLY */

const examUpload = document.getElementById("examUpload")

examUpload.addEventListener("change", function(){

const file = this.files[0]
const privacy = document.querySelector('input[name="privacy"]:checked').value

console.log("Upload file:", file)
console.log("Privacy:", privacy)

})

</script>

</body>
</html>
