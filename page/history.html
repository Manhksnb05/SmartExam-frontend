```html
<!DOCTYPE html>
<html lang="vi">
<head>

<meta charset="UTF-8">
<title>Lịch sử thi - Smart Exam</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

/* GLOBAL */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Segoe UI",sans-serif;
}

body{
background:linear-gradient(180deg,#f8faff,#eef2ff);
min-height:100vh;
animation:fadePage 0.9s ease;
}

@keyframes fadePage{
from{opacity:0;transform:translateY(8px)}
to{opacity:1;transform:translateY(0)}
}

/* NAVBAR */

.navbar{
background:rgba(255,255,255,0.85);
backdrop-filter:blur(12px);
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 60px;
border-bottom:1px solid #e2e8f0;
box-shadow:0 8px 25px rgba(0,0,0,0.04);
position:sticky;
top:0;
z-index:1000;
}

.logo{
font-size:22px;
font-weight:700;
color:#0B3C5D;
display:flex;
align-items:center;
gap:8px;
animation:logoFloat 4s infinite ease-in-out;
}

@keyframes logoFloat{
0%{transform:translateY(0)}
50%{transform:translateY(-3px)}
100%{transform:translateY(0)}
}

.nav-links{
display:flex;
align-items:center;
gap:28px;
}

.nav-links a{
text-decoration:none;
color:#334155;
font-weight:500;
position:relative;
transition:0.3s;
}

.nav-links a::after{
content:"";
position:absolute;
bottom:-6px;
left:0;
width:0%;
height:2px;
background:#3b82f6;
transition:0.3s;
}

.nav-links a:hover::after{
width:100%;
}

.nav-links a:hover{
color:#0B3C5D;
}

.nav-links a.active{
color:#0B3C5D;
font-weight:700;
}

.nav-cta{
background:linear-gradient(135deg,#0B3C5D,#2563eb);
color:white !important;
padding:10px 18px;
border-radius:30px;
font-weight:600;
box-shadow:0 10px 25px rgba(37,99,235,0.35);
}

/* MAIN */

.features{
max-width:1200px;
margin:auto;
padding:70px 20px;
}

/* HEADER */

.page-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:35px;
}

.page-header h2{
font-size:34px;
color:#0B3C5D;
font-weight:700;
position:relative;
}

.page-header h2::after{
content:"";
width:70px;
height:4px;
background:#3b82f6;
display:block;
margin-top:8px;
border-radius:3px;
}

/* SEARCH */

.search-box{
margin-bottom:35px;
max-width:420px;
position:relative;
}

.search-box input{
width:100%;
padding:13px 15px 13px 42px;
border-radius:50px;
border:1px solid #e2e8f0;
outline:none;
font-size:14px;
transition:0.25s;
background:white;
}

.search-box input:focus{
border-color:#3b82f6;
box-shadow:0 8px 20px rgba(59,130,246,0.25);
}

.search-box i{
position:absolute;
left:14px;
top:14px;
color:#64748b;
}

/* GRID */

.feature-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:25px;
}

/* HISTORY CARD */

.history-card{
padding:26px;
border-radius:20px;
background:white;
border:1px solid #e2e8f0;
transition:0.35s;
display:flex;
flex-direction:column;
gap:10px;
box-shadow:0 10px 25px rgba(0,0,0,0.03);
position:relative;
overflow:hidden;
}

.history-card::before{
content:"";
position:absolute;
width:100%;
height:100%;
background:linear-gradient(120deg,transparent,rgba(59,130,246,0.15),transparent);
top:-100%;
left:-100%;
transition:0.6s;
}

.history-card:hover::before{
top:100%;
left:100%;
}

.history-card:hover{
transform:translateY(-8px);
box-shadow:0 25px 45px rgba(0,0,0,0.08);
}

/* HEADER */

.history-header{
display:flex;
align-items:center;
gap:10px;
}

.history-header i{
font-size:20px;
color:#0B3C5D;
background:#e0f2fe;
width:36px;
height:36px;
border-radius:10px;
display:flex;
align-items:center;
justify-content:center;
}

.history-title{
font-size:17px;
font-weight:600;
color:#1e293b;
}

/* META */

.history-meta{
font-size:13px;
color:#64748b;
display:flex;
align-items:center;
gap:6px;
}

/* SCORE BADGE */

.history-score{
font-size:14px;
font-weight:700;
color:white;
background:linear-gradient(135deg,#22c55e,#16a34a);
padding:6px 12px;
border-radius:50px;
width:fit-content;
margin-top:4px;
box-shadow:0 6px 15px rgba(34,197,94,0.3);
}

/* ACTIONS */

.history-actions{
display:flex;
gap:10px;
margin-top:12px;
align-items:center;
}

/* VIEW BUTTON */

.btn-view{
background:linear-gradient(135deg,#0B3C5D,#2563eb);
color:white;
padding:8px 14px;
border-radius:50px;
font-size:13px;
text-decoration:none;
font-weight:600;
transition:0.3s;
}

.btn-view:hover{
transform:translateY(-2px);
box-shadow:0 8px 20px rgba(37,99,235,0.35);
}

/* ICON BUTTON */

.icon-btn{
width:36px;
height:36px;
border:none;
border-radius:10px;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
font-size:14px;
background:#f1f5f9;
color:#334155;
transition:0.25s;
}

.icon-btn:hover{
background:#e2e8f0;
transform:scale(1.08);
}

@media(max-width:768px){

.navbar{
padding:18px 20px;
}

.nav-links{
display:none;
}

.features{
padding:50px 20px;
}

}

</style>

</head>

<body>

<nav class="navbar">

<div class="logo">
<i class="fas fa-layer-group"></i> Smart Exam
</div>

<div class="nav-links">
<a href="../index.html">Trang chủ</a>
<a href="exam-bank.html">Ngân hàng đề</a>
<a href="history.html" class="active">Lịch sử thi</a>
<a href="community-exams.html">Khám phá đề</a>
<a href="../login.html" class="nav-cta">Đăng nhập</a>
</div>

</nav>

<section class="features">

<div class="page-header">
<h2>Lịch sử làm bài</h2>
</div>

<div class="search-box">
<i class="fas fa-search"></i>
<input
type="text"
id="searchInput"
placeholder="Tìm bài thi..."
>
</div>

<div class="feature-grid" id="historyList"></div>

</section>

<script>

/* MOCK DATA */

const historyData = [

{
title:"Đề thi Toán 12",
score:8,
total:10,
date:"10/03/2026",
time:"05:21"
},

{
title:"Đề thi Tiếng Anh",
score:7,
total:10,
date:"15/03/2026",
time:"06:10"
},

{
title:"Đề kiểm tra Vật lý",
score:9,
total:10,
date:"20/03/2026",
time:"04:48"
}

]

const historyList = document.getElementById("historyList")

function renderHistory(){

historyList.innerHTML=""

historyData.forEach((exam,index)=>{

historyList.innerHTML+=`

<div class="history-card">

<div class="history-header">
<i class="fas fa-file-alt"></i>
<div class="history-title">${exam.title}</div>
</div>

<div class="history-meta">
<i class="fas fa-calendar"></i> ${exam.date}
</div>

<div class="history-score">
Điểm: ${exam.score} / ${exam.total}
</div>

<div class="history-meta">
Thời gian làm: ${exam.time}
</div>

<div class="history-actions">

<a href="review.html" class="btn-view">
Xem chi tiết
</a>

<button class="icon-btn">
<i class="fas fa-download"></i>
</button>

<button class="icon-btn delete-btn" data-id="${index}">
<i class="fas fa-trash"></i>
</button>

</div>

</div>

`

})

}

renderHistory()

/* SEARCH */

const searchInput = document.getElementById("searchInput")

searchInput.addEventListener("input",function(){

let keyword = this.value.toLowerCase()

document.querySelectorAll(".history-card").forEach(card=>{

let title = card.querySelector(".history-title").innerText.toLowerCase()

card.style.display =
title.includes(keyword) ? "flex" : "none"

})

})

/* DELETE DEMO */

document.addEventListener("click",function(e){

if(e.target.closest(".delete-btn")){

let card = e.target.closest(".history-card")

if(confirm("Xóa bài thi này?")){
card.remove()
}

}

})

</script>

</body>
</html>
```
