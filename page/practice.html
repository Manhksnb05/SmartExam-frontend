<!DOCTYPE html>
<html lang="vi">
<head>

<meta charset="UTF-8">
<title>Luyện đề - Smart Exam</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

/* ===== BODY ===== */

body{
margin:0;
font-family:"Segoe UI",sans-serif;
background:#f1f5f9;
}

/* ===== NAVBAR ===== */

.navbar{
background:#ffffff;
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 60px;
border-bottom:1px solid #e2e8f0;
box-shadow:0 4px 10px rgba(0,0,0,0.04);
position:sticky;
top:0;
z-index:1000;
}

.logo{
font-size:20px;
font-weight:700;
color:#0B3C5D;
display:flex;
align-items:center;
gap:8px;
}

.nav-links{
display:flex;
align-items:center;
gap:28px;
}

.nav-links a{
text-decoration:none;
color:#334155;
font-weight:500;
transition:0.25s;
}

.nav-links a:hover{
color:#0B3C5D;
}

.nav-links a.active{
color:#0B3C5D;
font-weight:700;
border-bottom:2px solid #0B3C5D;
padding-bottom:4px;
}

.nav-cta{
background:#0B3C5D;
color:white !important;
padding:10px 18px;
border-radius:30px;
font-weight:600;
}

/* ===== LAYOUT ===== */

.practice-container{
display:flex;
gap:40px;
max-width:1200px;
margin:auto;
padding:50px 20px;
}

/* ===== QUESTIONS ===== */

.questions{
flex:1;
}

.question{
background:white;
border:1px solid #e2e8f0;
border-radius:16px;
padding:22px;
margin-bottom:22px;
transition:0.25s;
}

.question:hover{
box-shadow:0 10px 25px rgba(0,0,0,0.05);
}

/* ===== ANSWERS ===== */

.answers{
margin-top:14px;
}

.answers label{
display:block;
padding:12px;
margin-bottom:8px;
border-radius:10px;
cursor:pointer;
border:2px solid transparent;
background:#f8fafc;
transition:0.2s;
}

.answers label:hover{
border:2px solid #2563eb;
background:#f1f5ff;
}

/* selected */

.selected{
border:2px solid #2563eb;
background:#eef2ff;
}

/* correct */

.correct{
border:2px solid #22c55e !important;
background:#ecfdf5;
}

/* wrong */

.wrong{
border:2px solid #ef4444 !important;
background:#fef2f2;
}

/* ===== SIDEBAR ===== */

.sidebar{
width:230px;
position:sticky;
top:110px;
height:fit-content;
background:white;
padding:20px;
border-radius:16px;
border:1px solid #e2e8f0;
box-shadow:0 8px 20px rgba(0,0,0,0.04);
}

/* QUESTION NAV */

.question-nav{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:10px;
margin-bottom:20px;
}

.nav-btn{
background:#e2e8f0;
padding:10px;
border-radius:8px;
text-align:center;
cursor:pointer;
font-weight:600;
transition:0.2s;
}

.nav-btn:hover{
background:#cbd5f5;
}

/* result */

.nav-btn.correct{
background:#22c55e;
color:white;
}

.nav-btn.wrong{
background:#ef4444;
color:white;
}

/* ===== SUBMIT BUTTON ===== */

.submit-btn{
width:100%;
padding:12px;
background:linear-gradient(135deg,#0B3C5D,#2563eb);
color:white;
border:none;
border-radius:12px;
cursor:pointer;
font-weight:600;
transition:0.25s;
}

.submit-btn:hover{
transform:translateY(-2px);
box-shadow:0 8px 20px rgba(37,99,235,0.35);
}

/* ===== EXPLAIN ===== */

.explain-btn{
margin-top:12px;
cursor:pointer;
color:#2563eb;
font-weight:600;
display:none;
}

.explain{
margin-top:10px;
background:#f8fafc;
padding:12px;
border-left:4px solid #2563eb;
display:none;
border-radius:8px;
}

</style>

</head>

<body>

<!-- NAVBAR -->

<nav class="navbar">

<div class="logo">
<i class="fas fa-layer-group"></i> Smart Exam
</div>

<div class="nav-links">
<a href="../index.html">Trang chủ</a>
<a href="exam-bank.html" class="active">Ngân hàng đề</a>
<a href="history.html">Lịch sử thi</a>
<a href="community-exams.html">Khám phá đề</a>
<a href="../login.html" class="nav-cta">Đăng nhập</a>
</div>

</nav>

<section class="practice-container">

<div class="questions" id="questionList"></div>

<div class="sidebar">

<div class="question-nav" id="nav"></div>

<button class="submit-btn" onclick="submitExam()">Nộp bài</button>

</div>

</section>

<script>

const examData=[

{
question:"With the help of one of the IT technicians, the missing accounting files have been ____. ",
options:["recover","recovers","recovering","recovered"],
correct:"D",
explain:"Cấu trúc hiện tại hoàn thành bị động: have been + V3 → recovered."
},

{
question:"The manager asked the staff to submit the report ____ Friday.",
options:["in","on","at","by"],
correct:"D",
explain:"'By Friday' nghĩa là trước hoặc vào thứ Sáu."
},

{
question:"She ____ to the office before the meeting started.",
options:["go","went","gone","going"],
correct:"B",
explain:"Hành động trong quá khứ → went."
}

]

let submitted=false

const questionList=document.getElementById("questionList")
const nav=document.getElementById("nav")

examData.forEach((q,i)=>{

let html=`

<div class="question" id="q${i}">

<b>Câu ${i+1}: ${q.question}</b>

<div class="answers">

<label onclick="selectAnswer(this,'q${i}',${i})">
<input type="radio" name="q${i}" value="A">
A. ${q.options[0]}
</label>

<label onclick="selectAnswer(this,'q${i}',${i})">
<input type="radio" name="q${i}" value="B">
B. ${q.options[1]}
</label>

<label onclick="selectAnswer(this,'q${i}',${i})">
<input type="radio" name="q${i}" value="C">
C. ${q.options[2]}
</label>

<label onclick="selectAnswer(this,'q${i}',${i})">
<input type="radio" name="q${i}" value="D">
D. ${q.options[3]}
</label>

</div>

<div class="explain-btn" id="btn${i}" onclick="toggleExplain(${i})">
+ Hiển thị giải thích
</div>

<div class="explain" id="explain${i}">
${q.explain}
</div>

</div>

`

questionList.innerHTML+=html

nav.innerHTML+=`<div class="nav-btn" onclick="gotoQuestion(${i})">${i+1}</div>`

})

function selectAnswer(label,name,i){

let labels=document.querySelectorAll(`input[name="${name}"]`)

labels.forEach(input=>{
input.parentElement.classList.remove("selected","wrong","correct")
})

label.classList.add("selected")

if(submitted){
nav.children[i].classList.remove("correct","wrong")
}

}

function gotoQuestion(i){

document.getElementById("q"+i).scrollIntoView({
behavior:"smooth"
})

}

function submitExam(){

submitted=true

examData.forEach((q,i)=>{

let selected=document.querySelector(`input[name="q${i}"]:checked`)
let navBtn=nav.children[i]

document.getElementById("btn"+i).style.display="block"

if(!selected){

navBtn.classList.add("wrong")
return
}

let label=selected.parentElement

if(selected.value===q.correct){

label.classList.add("correct")
navBtn.classList.add("correct")

}else{

label.classList.add("wrong")
navBtn.classList.add("wrong")

}

})

}

function toggleExplain(i){

let ex=document.getElementById("explain"+i)

ex.style.display=
ex.style.display==="block"?"none":"block"

}

</script>

</body>
</html>
